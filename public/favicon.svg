<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0808"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.6"/>
  <!-- Bar chart icon (analyzer) -->
  <g filter="url(#glow)" opacity="0.25">
    <rect x="80" y="320" width="60" height="120" rx="8" fill="#f59e0b"/>
    <rect x="170" y="260" width="60" height="180" rx="8" fill="#f59e0b"/>
    <rect x="260" y="200" width="60" height="240" rx="8" fill="#f59e0b"/>
    <rect x="350" y="280" width="60" height="160" rx="8" fill="#f59e0b"/>
  </g>
  <!-- PA text -->
  <text x="256" y="310" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="260" fill="url(#gold)" text-anchor="middle" dominant-baseline="central" letter-spacing="-12" filter="url(#glow)">PA</text>
  <!-- Small tagline -->
  <text x="256" y="430" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="48" fill="#fbbf24" text-anchor="middle" opacity="0.7" letter-spacing="12">ANALYZER</text>
</svg>
