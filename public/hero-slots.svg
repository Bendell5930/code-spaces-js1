<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Slot machine body -->
  <rect x="280" y="40" width="240" height="220" rx="20" fill="url(#gold)" opacity="0.08"/>
  <rect x="295" y="70" width="210" height="120" rx="10" fill="#f59e0b" opacity="0.06"/>

  <!-- Three reel windows -->
  <rect x="310" y="85" width="55" height="90" rx="6" fill="#fbbf24" opacity="0.07"/>
  <rect x="373" y="85" width="55" height="90" rx="6" fill="#fbbf24" opacity="0.07"/>
  <rect x="436" y="85" width="55" height="90" rx="6" fill="#fbbf24" opacity="0.07"/>

  <!-- Reel symbols: 7s -->
  <text x="337" y="142" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#f59e0b" opacity="0.12" text-anchor="middle">7</text>
  <text x="400" y="142" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#f59e0b" opacity="0.12" text-anchor="middle">7</text>
  <text x="463" y="142" font-family="Arial,sans-serif" font-size="36" font-weight="900" fill="#f59e0b" opacity="0.12" text-anchor="middle">7</text>

  <!-- Handle -->
  <rect x="530" y="90" width="12" height="100" rx="6" fill="#f59e0b" opacity="0.06"/>
  <circle cx="536" cy="85" r="14" fill="#fbbf24" opacity="0.08"/>

  <!-- Lever base -->
  <rect x="280" y="200" width="240" height="18" rx="8" fill="#f59e0b" opacity="0.05"/>

  <!-- Scattered coins (left side) -->
  <circle cx="120" cy="80" r="20" fill="#fbbf24" opacity="0.06"/>
  <text x="120" y="87" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#f59e0b" opacity="0.1" text-anchor="middle">$</text>
  <circle cx="80" cy="180" r="16" fill="#fbbf24" opacity="0.05"/>
  <text x="80" y="186" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#f59e0b" opacity="0.08" text-anchor="middle">$</text>
  <circle cx="160" cy="230" r="14" fill="#fbbf24" opacity="0.04"/>

  <!-- Scattered coins (right side) -->
  <circle cx="680" cy="100" r="18" fill="#fbbf24" opacity="0.06"/>
  <text x="680" y="107" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#f59e0b" opacity="0.1" text-anchor="middle">$</text>
  <circle cx="720" cy="200" r="15" fill="#fbbf24" opacity="0.05"/>
  <circle cx="640" cy="250" r="12" fill="#fbbf24" opacity="0.04"/>

  <!-- Star sparkles -->
  <polygon points="200,50 204,60 215,60 206,67 209,78 200,71 191,78 194,67 185,60 196,60" fill="#fbbf24" opacity="0.08"/>
  <polygon points="600,60 603,68 612,68 605,73 607,82 600,77 593,82 595,73 588,68 597,68" fill="#fbbf24" opacity="0.07"/>
  <polygon points="150,140 152,146 159,146 154,150 156,156 150,152 144,156 146,150 141,146 148,146" fill="#fbbf24" opacity="0.06"/>
  <polygon points="660,160 662,166 669,166 664,170 666,176 660,172 654,176 656,170 651,166 658,166" fill="#fbbf24" opacity="0.06"/>

  <!-- Diamond accents -->
  <polygon points="50,120 58,135 50,150 42,135" fill="#38bdf8" opacity="0.05"/>
  <polygon points="750,80 756,92 750,104 744,92" fill="#38bdf8" opacity="0.05"/>
</svg>
